name: trackify_bus_dashboard
description: A smart bus monitoring dashboard for drivers.
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Map rendering and location handling
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  
  # For triggering the phone dialer and opening URLs
  url_launcher: ^6.3.1
  
  # For fetching external sensor data
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true